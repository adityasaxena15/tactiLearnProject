<!DOCTYPE html>
<html>
<head>
    <title>TactiLearn Quiz</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.7);
            margin: 50px auto;
            padding: 30px;
            width: 80%;
            max-width: 600px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background-color: #ff9800;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e68900;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎯 TactiLearn Quiz</h1>

    <button onclick="startQuiz()">Start Quiz</button>
    <button onclick="toggleLectures()">Lectures</button>

    <div id="lectureBox" style="display:none; margin-top:20px;">
        <h3>📚 Lectures</h3>

        <a href="https://youtu.be/DjHvDsH_RiY" target="_blank">Lecture 1</a><br><br>
        <a href="https://www.youtube.com/live/-rQqJhTl1NY" target="_blank">Lecture 2</a>
    </div>

    <div id="quizBox" style="margin-top:20px;"></div>

</div>

<script>

    let currentQuestion = null;

    function startQuiz() {
        fetch('/game/startQuiz')
        .then(() => loadNextQuestion());
    }

    function loadNextQuestion() {
        fetch('/game/nextQuestion')
        .then(res => res.json())
        .then(data => {

            if (!data || !data.question) {
                showResult();
                return;
            }

            currentQuestion = data;

            document.getElementById("quizBox").innerHTML = `
                <h3>${data.question}</h3>

                <button onclick="submitAnswer('${data.option1}')">${data.option1}</button><br><br>
                <button onclick="submitAnswer('${data.option2}')">${data.option2}</button><br><br>
                <button onclick="submitAnswer('${data.option3}')">${data.option3}</button>
            `;
        });
    }

    function submitAnswer(answer) {
        fetch('/game/submitAnswer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ selectedAnswer: answer })
        })
        .then(res => res.text())
        .then(result => {
            alert(result);
            loadNextQuestion();
        });
    }

    function showResult() {
        fetch('/game/result')
        .then(res => res.text())
        .then(result => {
            document.getElementById("quizBox").innerHTML = `
                <h2>🎉 Quiz Finished!</h2>
                <h3>${result}</h3>
                <button onclick="startQuiz()">Restart Quiz</button>
            `;
        });
    }

    function toggleLectures() {
        let box = document.getElementById("lectureBox");
        box.style.display = box.style.display === "none" ? "block" : "none";
    }

</script>

</body>
</html>
